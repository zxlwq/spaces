name: Build and Push Thunderx Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Thunderx/pikpakapi/'
      - 'Thunderx/templates/'
      - 'Thunderx/Dockerfile'
      - 'Thunderx/README.md'
      - 'Thunderx/main.py'
      - 'Thunderx/requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: lower-repo
        shell: pwsh
        run: |
          echo "repository=$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Thunderx
          push: true
          tags: |
            ghcr.io/zxlwq/thunderx:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Thunderx Docker Image
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
